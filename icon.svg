<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners (maskable safe zone uses center 80%) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle purple radial glow -->
  <radialGradient id="glow-bg" cx="50%" cy="45%" r="45%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#glow-bg)"/>
  <!-- Lightning bolt -->
  <path d="M296 68 L148 276 h112 L176 444 L364 212 H252 Z"
        fill="url(#bolt)" filter="url(#glow)"/>
</svg>
